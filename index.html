<style>

body {

    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    color: white;
    font-family: 'Cinzel', serif;
    position: relative;
    overflow: hidden;
}

.bg-blur {
    position: absolute;
    inset: 0; /* растягиваем по всему экрану */
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(30px) brightness(0.3); /* размытие + затемнение */
    z-index: 0; /* фон под всем остальным */
    pointer-events: none; /* клики проходят сквозь фон */
}

/* затемнение */
body.dimmed::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 1;
    pointer-events: none;
}

/* CONTENT */
#content {
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 1;
    transition: opacity 1s ease;
    margin-top: 24px;
    z-index: 2;
}

.more-info {
    opacity: 0.9;
    position: relative;
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
    margin-bottom: 18px;
    letter-spacing: 0.3px;
    transition: 0.3s;
    z-index: 5;
}

.more-info:hover {
    color: white;
    opacity: 1;
    letter-spacing: 2px;
}

/* IMAGE */
.main-image {
    width: 260px;
    height: 260px;
    object-fit: cover;
    border-radius: 18px;
    margin-bottom: 24px;
    transition: transform 0.2s ease, box-shadow 0.5s ease;
    transform: rotateX(var(--tiltX, 0deg)) rotateY(var(--tiltY, 0deg)) scale(1);
}

.main-image:hover {
    --tiltX: 6deg;
    --tiltY: 6deg;
    transform: rotateX(var(--tiltX)) rotateY(var(--tiltY)) scale(1.02);
}

.main-image.glow {
    box-shadow: 0 0 35px rgba(255,140,0,0.35);
}

/* BUTTON */
#button {
    padding: 12px 34px;
    border-radius: 24px;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    color: white;
    background: rgba(255,120,0,0.18);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.18);
    box-shadow: 0 0 18px rgba(255,140,0,0.15);
    animation: pulse 2s infinite;
    margin-bottom: 20px;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
}

/* AUDIO CONTROL */
#audioControl {
    position: absolute;
    top: 26px;
    right: 95px;
    z-index: 10;
    font-size: 22px;
    cursor: pointer;
}

/* INFO PANEL */
.info-panel {
    pointer-events: none;
    position: absolute;
    top: 22%;
    width: 90%;
    display: flex;
    justify-content: space-between;
    z-index: 2;
}

.info-left,
.info-right {
    width: 30%;
    font-size: 17px;
    line-height: 2;
    opacity: 0;
    transform: translateX(60px);
    transition: all 0.6s ease;
    pointer-events: none;
}

.info-left {
    transform: translateX(-60px);
    text-align: left;
}

.info-right {
    text-align: right;
}

.info-left.active,
.info-right.active {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
}

.info-title {
    color: #aaa;
    margin-bottom: 16px;
    font-weight: bold;
    letter-spacing: 5px;
}

.info-panel a {
    color: #fff;
    text-decoration: none;
    transition: color 0.3s ease, text-shadow 0.3s ease;
    text-shadow: 
        0 0 8px rgba(255,140,0,0.6),
        0 0 16px rgba(255,140,0,0.5),
        0 0 24px rgba(255,140,0,0.4),
        0 0 36px rgba(255,140,0,0.3);
}

.info-panel a:hover {
    color: #ff8c00; /* оранжевый */
    text-shadow: 
        0 0 10px rgba(255,140,0,0.8),
        0 0 20px rgba(255,140,0,0.7),
        0 0 30px rgba(255,140,0,0.6),
        0 0 50px rgba(255,140,0,0.4);
}


/* TELEGRAM */
.telegram-links {
    position: absolute;
    bottom: 40px;
    display: flex;
    gap: 80px;
    z-index: 2;
}

.telegram-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: white;
    font-size: 12px;
}

.telegram-icon {
    width: 32px;
    height: 25px;
    border-radius: 50%;
    margin-bottom: 8px;
}

.ui-button {
    position: absolute;
    top: 20px;
    right: 20px;

    width: 42px;
    height: 42px;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 18px;
    text-decoration: none;
    color: #e6d3a3;

    border-radius: 50%;
    background: rgba(255,120,0,0.18);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,215,150,0.2);

    box-shadow: 0 0 12px rgba(255,215,150,0.2);

    transition: 0.3s;
    z-index: 10;
}

.ui-button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px rgba(255,215,150,0.6);
}

</style>

<audio id="snippetAudio" src="websnippet.mp3" loop preload="auto"></audio>
<audio id="openSound" src="open.mp3" preload="auto"></audio>
<audio id="closeSound" src="close.mp3" preload="auto"></audio>

<script>
const audio = document.getElementById("snippetAudio");
const control = document.getElementById("audioControl");
const openSound = document.getElementById("openSound");
const closeSound = document.getElementById("closeSound");

audio.volume = 0.25;

let isPlaying = false;
let offsetY = 0;

/* AUDIO */
control.onclick = () => {
    if(isPlaying){
        audio.pause();
        control.textContent = "▶";
    } else {
        audio.play();
        control.textContent = "⏸";
    }
    isPlaying = !isPlaying;
};

/* INFO */
document.getElementById("infoToggle").onclick = () => {
    const toggle = document.getElementById("infoToggle");
    const isOpening = toggle.textContent === "more info."; // true если открываем

    if(isOpening){
        openSound.currentTime = 0;
        openSound.play();
    } else {
        closeSound.currentTime = 0;
        closeSound.play();
    }

    document.getElementById("leftInfo").classList.toggle("active");
    document.getElementById("rightInfo").classList.toggle("active");

    document.body.classList.toggle("dimmed");

    const img = document.getElementById("mainImage");
    img.classList.toggle("glow");

    offsetY = offsetY === 0 ? 20 : 0;

    toggle.textContent = isOpening ? "close" : "more info.";

};

/* PARALLAX */
document.addEventListener("mousemove", e => {
    const img = document.getElementById("mainImage");

    const x = (window.innerWidth/2 - e.clientX)/30;
    const y = (window.innerHeight/2 - e.clientY)/30;

    img.style.transform = `translate(${x}px, ${y + offsetY}px)`;
});
</script>
